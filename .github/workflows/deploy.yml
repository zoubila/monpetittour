name: Deploy

on:
  push:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: ChangeMe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://app:ChangeMe@127.0.0.1:5432/app?serverVersion=16&charset=utf8

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, intl, zip, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon src tests

      - name: Create test database
        run: php bin/console doctrine:database:create --if-not-exists

      - name: Run PHPUnit
        run: php bin/phpunit

  deploy:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /srv/apps/monpetittour
            git pull --rebase origin master
            docker compose up -d --build
            docker compose exec -T app php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            docker image prune -f
