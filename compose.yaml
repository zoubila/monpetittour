services:
  app:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    container_name: monpetittour_app
    restart: unless-stopped
    env_file:
      - .env.local
    networks:
      - monpetittour_internal
      - caddy_net
    depends_on:
      - database
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: monpetittour_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monpetittour}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMeLater}
      POSTGRES_USER: ${POSTGRES_USER:-monpetittour}
    ports:
      - "${POSTGRES_PORT_BIND:-127.0.0.1:5432}:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - monpetittour_internal

volumes:
  database_data:

networks:
  monpetittour_internal:
    driver: bridge

  caddy_net:
    external: true
